apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: test-ns-feast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: 'quay.io/feastdev-ci/feast-test-images@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065'
          command: ["redis-server", "--save", ""]
          ports:
            - containerPort: 6379
          env:
          - name: ALLOW_EMPTY_PASSWORD
            value: "yes"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: test-ns-feast
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: redis
