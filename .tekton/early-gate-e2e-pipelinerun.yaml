apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/feast?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "early-gate"
    pipelinesascode.tekton.dev/on-comment: "^/early-gate"
  labels:
    appstudio.openshift.io/application: group-testing
    appstudio.openshift.io/component: feast-group
    pipelines.appstudio.openshift.io/type: test
  name: feast-early-gate-pipeline
  namespace: open-data-hub-tenant
spec:
  params:
  - name: group-components
    value: '{ "odh-feast-operator-ci": "opendatahub/feast-operator", "odh-feature-server-ci": "opendatahub/feature-server" }'
  - name: operator-git-url
    value: '{{source_url}}'
  - name: operator-revision
    value: '{{revision}}'
  - name: operator-output-image
    value: quay.io/opendatahub/opendatahub-operator:odh-pr-{{revision}}
  - name: bundle-output-image
    value: quay.io/opendatahub/opendatahub-operator-bundle:odh-pr-{{revision}}
  - name: catalog-output-image
    value: quay.io/opendatahub/opendatahub-operator-catalog:odh-pr-{{revision}}
  - name: operator-dockerfile
    value: Dockerfiles/rhoai.Dockerfile
  - name: build-version-tag
    value: "odh-stable"
  - name: operator-build-args
    value:
    - BUILD_TYPE=CI
  - name: pipeline-type
    value: "pull-request"
  - name: image-expires-after
    value: "7d"
  - name: build-config-git-url
    value: "https://github.com/opendatahub-io/ODH-Build-Config"
  - name: build-config-revision
    value: "main"
  - name: openshift-version
    value: "v4.20"
  - name: quay-tag
    value: "odh-stable"
  - name: utils-repo-url
    value: "https://github.com/red-hat-data-services/RHOAI-Konflux-Automation.git"
  - name: utils-repo-ref
    value: "odh"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/odh-konflux-central.git
    - name: revision
      value: 'earlygate'
    - name: pathInRepo
      value: e2e-early-gate/early-gate-e2e-pipeline.yaml
  taskRunTemplate:
    serviceAccountName: konflux-integration-runner
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
